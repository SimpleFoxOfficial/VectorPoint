[backpack]
	#Base backpack storage slots
	# Default: 12
	# Range: 3 ~ 27
	baseBackpackSlots = 12
	#
	#Allow removing backpacks even when they contain items
	allowRemovingBackpackWithItems = true
	#
	#Items matching existing backpack/module stacks are inserted before player inventory
	prioritizeExistingBackpackStacks = true
	#
	#Shift-clicking items while the backpack is open will add them to existing stacks within your backpack
	prioritizeExistingBackpackStacksOnShiftClick = true

[enchantments]
	#Enable the Linking enchantment
	enableLinkingEnchant = true
	#
	#Enable the Back Protection enchantment
	enableBackProtectionEnchant = true
	#
	#Enable the Packing enchantment
	enablePackingEnchant = true
	#
	#Enable the Rationing enchantment
	enableRationingEnchant = true

[packing]
	#Maximum total count a packed stack can display/use
	# Default: 768
	# Range: 64 ~ 1728
	packedBackpackCapacity = 768
	#
	#Display packed items as normal stack-sized entries
	packedItemsSeparateStacks = true
	#
	#Sort packed items by newest first
	packedItemsNewestFirst = true

[pouches]
	#Set false to disable entirely
	enablePouch = true
	#
	#Base pouch slots
	# Default: 6
	# Range: 3 ~ 27
	pouchSlots = 6
	#
	#Set false to disable entirely
	enableLatchedPouch = true
	#
	#Latched pouch slots
	# Default: 12
	# Range: 3 ~ 27
	latchedPouchSlots = 12
	#
	#Set false to disable entirely
	enableStuddedPouch = true
	#
	#Studded pouch slots
	# Default: 18
	# Range: 3 ~ 27
	studdedPouchSlots = 18

[echo_pouch]
	#Set false to disable entirely
	enableEchoPouch = true
	#
	#Echo pouch slots.
	# Default: 15
	# Range: 3 ~ 27
	echoPouchSlots = 15

[sacks]
	#Set false to disable entirely
	enableSack = true
	#
	#Sack slots.
	# Default: 15
	# Range: 3 ~ 27
	sackSlots = 15
	#
	#Set false to disable entirely
	enablePhantomStitchSack = true
	#
	#Phantom sack slots
	# Default: 24
	# Range: 3 ~ 27
	phantomSackSlots = 24

[climbing]
	#Set false to disable entirely
	enableClimbingGear = true
	#
	#Max wall jumps before refresh
	# Default: 2
	# Range: 0 ~ 10
	climbingMaxCharges = 2
	#
	#If true, wall hops with Climbing Gear add hunger exhaustion
	climbingHopUsesHunger = true
	#
	#Exhaustion added per Climbing Gear wall hop. 4.0 exhaustion = about 1 hunger point
	# Default: 1.0
	# Range: 0.0 ~ 40.0
	climbingHopExhaustion = 1.0

[farming]
	#Set false to disable entirely
	enableFarmingPot = true
	#
	#Set false to disable entirely
	enableGildedFarmingPot = true
	#
	#Disables Serene Seasons integration entirely when false
	enableFarmingSeasons = true
	#
	#Ticks required for crops to grow in Farming Pots
	# Default: 6000
	# Range: 20 ~ 120000
	farmingGrowthTime = 6000

[quiver]
	#Set false to disable entirely
	enableQuiver = true
	#
	#Set false to disable entirely
	enableGildedQuiver = true

[cooking]
	#Set false to disable entirely
	enableCookingPot = true
	#
	#Ticks required for a Cooking Pot to cook items
	# Default: 600
	# Range: 20 ~ 72000
	cookingCookTime = 600

[buckler]
	#Set false to disable entirely
	enableBuckler = true
	#
	#Set false to disable entirely
	enableReinforcedBuckler = true
	#
	#Set false to disable entirely
	enableNetheriteBuckler = true

["potion pouch"]
	#Set false to disable entirely
	enablePotionPouch = true
	#
	#Set false to disable entirely
	enablePotionBag = true
	#
	#Potion pouch slots
	# Default: 3
	# Range: 1 ~ 27
	potionPouchSlots = 3
	#
	#Potion bag slots
	# Default: 9
	# Range: 1 ~ 27
	potionBagSlots = 9

[toolbox]
	#Set false to disable entirely
	enableToolbox = true

[crafting]
	#Set false to disable entirely
	enableCraftingStation = true

[bagowind]
	#Set false to disable entirely
	enableBagOWind = true

[sieve]
	#Set false to disable entirely
	enableAncientSieve = true

["fluid tanks"]
	#Set false to disable entirely
	enableCopperTank = true
	#
	#Set false to disable entirely
	enableObsidianTank = true
	#
	#Copper Tank capacity in millibuckets. 1000 mB = 1 bucket.
	# Default: 10000
	# Range: 1000 ~ 50000
	copperTankCapacity = 10000
	#
	#Obsidian Tank capacity in millibuckets. 1000 mB = 1 bucket.
	# Default: 20000
	# Range: 1000 ~ 50000
	obsidianTankCapacity = 20000

[glider]
	#Set false to disable entirely
	enableGlider = true

[create]
	#Maximum amount of Create backtanks allowed in backpack module slots
	# Default: 4
	# Range: 0 ~ 4
	maxBacktanksInBackpack = 4

[curios]
	#If true, registers a Curios back slot for backpacks
	enableCuriosBackSlot = true
